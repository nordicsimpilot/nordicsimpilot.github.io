<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NordicSimPilot</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
background:#0f172a;
color:white;
line-height:1.6;
display:flex;
flex-direction:column;
align-items:center;
}

/* HEADER */

header{
text-align:center;
padding:50px 20px 30px;
}

.logo a{
font-size:36px;
font-weight:700;
text-decoration:none;
color:white;
letter-spacing:1px;
}

nav{
margin-top:15px;
}

nav a{
margin:0 14px;
text-decoration:none;
color:#cbd5f5;
font-size:18px;
}

nav a:hover{
color:white;
}

/* SECTION */

.section{
padding:50px 20px;
max-width:1100px;
width:100%;
text-align:center;
}

.section h2{
font-size:34px;
margin-bottom:40px;
}

/* FLIGHT GRID */

.flight-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:30px;
}

/* FLIGHT CARD */

.flight-card{
background:#1e293b;
padding:20px;
border-radius:14px;
border:1px solid rgba(255,255,255,0.05);
text-decoration:none;
color:white;
transition:0.25s;
}

.flight-card:hover{
transform:translateY(-6px);
border:1px solid rgba(255,255,255,0.15);
}

.flight-card img{
width:100%;
height:190px;
object-fit:cover;
border-radius:10px;
margin-bottom:14px;
}

.flight-card h3{
font-size:22px;
margin-bottom:6px;
}

.flight-card p{
font-size:16px;
color:#94a3b8;
}

/* FOOTER */

footer{
margin-top:70px;
padding:30px;
text-align:center;
color:#64748b;
font-size:15px;
}

</style>

</head>

<body>

<header>

<div class="logo">
<a href="/">NordicSimPilot</a>
</div>

</div>

</html>
