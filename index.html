<!DOCTYPE html>

<html>
<head>

<meta charset="utf-8">
<title>Payam's Flight Logbook</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:system-ui,-apple-system,Segoe UI,Roboto;
background:#0a0a0a;
color:white;
}

.leaflet-interactive:focus{
outline:none !important;
}

#map{
position:absolute;
top:0;
bottom:0;
width:100%;
}

.top-ui{
position:absolute;
top:20px;
left:50%;
transform:translateX(-50%);
z-index:1000;
text-align:center;
background:rgba(10,10,10,0.85);
padding:14px 28px;
border-radius:12px;
}

.top-ui h1{
margin:0;
font-size:28px;
font-weight:600;
}

.top-ui p{
margin-top:4px;
color:#b5b5b5;
font-size:13px;
}

.nav{
margin-top:10px;
display:flex;
justify-content:center;
gap:25px;
}

.nav a{
color:white;
text-decoration:none;
font-size:13px;
opacity:0.9;
}

.nav a:hover{
opacity:1;
text-decoration:underline;
}

.route-label{
background:rgba(0,0,0,0.9);
color:white;
padding:4px 8px;
border-radius:6px;
font-size:12px;
border:none;
}

/* GLOW EFFECT */
.glow-line{
filter: drop-shadow(0 0 6px rgba(47,128,237,0.6));
}

/* RECENT FLIGHTS PANEL */

.recent-flights{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
z-index:1000;
background:rgba(10,10,10,0.9);
padding:14px 20px;
border-radius:12px;
width:260px;
text-align:left;
}

.recent-flights h3{
margin:0 0 8px 0;
font-size:14px;
font-weight:600;
}

.recent-flights ul{
list-style:none;
padding:0;
margin:0;
}

.recent-flights li{
font-size:13px;
padding:4px 0;
border-bottom:1px solid rgba(255,255,255,0.08);
}

.recent-flights li:last-child{
border-bottom:none;
}

.recent-flights a{
color:#2F80ED;
text-decoration:none;
}

.recent-flights a:hover{
text-decoration:underline;
}

</style>

</head>

<body>

<div id="map"></div>

<div class="top-ui">
<h1>Payam’s Flight Logbook</h1>
<p>Virtual routes across the world</p>

<div class="nav">
<a href="index.html">Map</a>
<a href="aircraft.html">Aircraft</a>
<a href="about.html">About</a>
</div>
</div>

<div class="recent-flights">
<h3>Recent Flights</h3>
<ul id="recent-list"></ul>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([55,10],4);

L.tileLayer(
'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
{
attribution:'© OpenStreetMap contributors © CARTO'
}).addTo(map);

/* PROFESSIONAL AVIATION BLUE */
var routeColor = "#2F80ED";

var routeData = [];

function animateRoute(coords, link, label){

routeData.push({coords, link, label});

let line = L.polyline([],{
color:routeColor,
weight:4,
opacity:0.8,
lineCap:'round',
lineJoin:'round',
className:'glow-line'
}).addTo(map);

let i = 0;

let interval = setInterval(function(){
line.addLatLng(coords[i]);
i++;
if(i >= coords.length){
clearInterval(interval);
}
},100);

function goToFlight(e){
L.DomEvent.stopPropagation(e);
window.location.href = link;
}

line.on('click', goToFlight);
line.on('touchstart', goToFlight);

line.on('mouseover',function(){
line.setStyle({weight:6});
line.bindTooltip(label,{
direction:'top',
className:'route-label'
}).openTooltip();
});

line.on('mouseout',function(){
line.setStyle({weight:4});
line.closeTooltip();
});

line.on('mousedown',function(e){
L.DomEvent.preventDefault(e);
});

return line;
}

/* ROUTES */

var routes = [];

routes.push(animateRoute(
[[60.3172,24.9633],[59.6519,17.9186]],
'flights/efhk-essa.html',
'EFHK → ESSA'
));

routes.push(animateRoute(
[[62.6629,29.6076],[60.3172,24.9633]],
'flights/efjo-efhk.html',
'EFJO → EFHK'
));

routes.push(animateRoute(
[[59.6519,17.9186],[60.1939,11.1004]],
'flights/essa-engm.html',
'ESSA → ENGM'
));

routes.push(animateRoute(
[[60.1939,11.1004],[53.4213,-6.2701]],
'flights/engm-eidw.html',
'ENGM → EIDW'
));

routes.push(animateRoute(
[[53.4213,-6.2701],[51.4700,-0.4543]],
'flights/eidw-egll.html',
'EIDW → EGLL (A330)'
));

routes.push(animateRoute(
[[51.4700,-0.4543],[38.7742,-9.1342]],
'flights/egll-lppt.html',
'EGLL → LPPT (A330)'
));

routes.push(animateRoute(
[[38.7742,-9.1342],[40.4722,-3.5608]],
'flights/lppt-lemd.html',
'LPPT → LEMD (A330)'
));

routes.push(animateRoute(
[[40.4722,-3.5608],[49.0097,2.5479]],
'flights/lemd-lfpg.html',
'LEMD → LFPG (A330)'
));
  
routes.push(animateRoute(
[[49.0097,2.5479],[50.9010,4.4844]],
'flights/lfpg-ebbr.html',
'LFPG → EBBR (A330)'
));

routes.push(animateRoute(
[[50.9010,4.4844],[52.3105,4.7683]],
'flights/ebbr-eham.html',
'EBBR → EHAM (A330)'
));

/* FUTURE ROUTES (UNCOMMENT WHEN FLOWN)

routes.push(animateRoute(
[[50.9010,4.4844],[49.6233,6.2044]],
'flights/ebbr-ellx.html',
'EBBR → ELLX'
));

routes.push(animateRoute(
[[49.6233,6.2044],[46.9141,7.4972]],
'flights/ellx-lszb.html',
'ELLX → LSZB'
));

routes.push(animateRoute(
[[46.9141,7.4972],[41.8003,12.2389]],
'flights/lszb-lirf.html',
'LSZB → LIRF'
));

routes.push(animateRoute(
[[41.8003,12.2389],[41.4147,19.7206]],
'flights/lirf-lati.html',
'LIRF → LATI'
));

routes.push(animateRoute(
[[41.4147,19.7206],[37.9364,23.9475]],
'flights/lati-lgav.html',
'LATI → LGAV'
));

routes.push(animateRoute(
[[37.9364,23.9475],[41.9616,21.6214]],
'flights/lgav-lwsk.html',
'LGAV → LWSK'
));

routes.push(animateRoute(
[[41.9616,21.6214],[44.8184,20.3091]],
'flights/lwsk-lybe.html',
'LWSK → LYBE'
));

*/

/* AIRPORTS */

function airport(lat,lon){
L.circleMarker([lat,lon],{
radius:4,
color:"#000",
weight:1,
fillColor:"#fff",
fillOpacity:1
}).addTo(map);
}

airport(60.3172,24.9633);
airport(59.6519,17.9186);
airport(62.6629,29.6076);
airport(60.1939,11.1004);
airport(53.4213,-6.2701);
airport(51.4700,-0.4543);
airport(38.7742,-9.1342);
airport(40.4722,-3.5608);
airport(49.0097,2.5479);
airport(50.9010,4.4844);
airport(52.3105,4.7683);

/* FUTURE AIRPORTS (UNCOMMENT WHEN NEEDED)

airport(49.6233,6.2044); // ELLX
airport(46.9141,7.4972); // LSZB
airport(41.8003,12.2389); // LIRF
airport(41.4147,19.7206); // LATI
airport(37.9364,23.9475); // LGAV
airport(41.9616,21.6214); // LWSK
airport(44.8184,20.3091); // LYBE

*/

/* FIT MAP */

var group = L.featureGroup(routes);
map.fitBounds(group.getBounds(),{padding:[80,80]});

/* RECENT FLIGHTS AUTO */

var recentList = document.getElementById("recent-list");
var lastThree = routeData.slice(-3).reverse();

lastThree.forEach(function(flight){
let li = document.createElement("li");
li.innerHTML = `<a href="${flight.link}">${flight.label}</a>`;
recentList.appendChild(li);
});

</script>

</body>
</html>
