<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<title>Payam's Flight Logbook</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:system-ui,-apple-system,Segoe UI,Roboto;
background:#0a0a0a;
color:white;
}

/* REMOVE CLICK BOX / OUTLINE */
.leaflet-interactive:focus{
outline:none !important;
}

/* MAP */

#map{
position:absolute;
top:0;
bottom:0;
width:100%;
}

/* TOP UI */

.top-ui{
position:absolute;
top:20px;
left:50%;
transform:translateX(-50%);
z-index:1000;
text-align:center;
background:rgba(10,10,10,0.85);
padding:14px 28px;
border-radius:12px;
}

.top-ui h1{
margin:0;
font-size:28px;
font-weight:600;
}

.top-ui p{
margin-top:4px;
color:#b5b5b5;
font-size:13px;
}

.nav{
margin-top:10px;
display:flex;
justify-content:center;
gap:25px;
}

.nav a{
color:white;
text-decoration:none;
font-size:13px;
opacity:0.9;
}

.nav a:hover{
opacity:1;
text-decoration:underline;
}

/* TOOLTIP */

.route-label{
background:rgba(0,0,0,0.9);
color:white;
padding:4px 8px;
border-radius:6px;
font-size:12px;
border:none;
}

</style>

</head>

<body>

<div id="map"></div>

<div class="top-ui">
<h1>Payam’s Flight Logbook</h1>
<p>Virtual routes across the world</p>

<div class="nav">
<a href="index.html">Map</a>
<a href="aircraft.html">Aircraft</a>
<a href="about.html">About</a>
</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

/* MAP */

var map = L.map('map').setView([60,15],4);

/* TILE */

L.tileLayer(
'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
{
attribution:'© OpenStreetMap contributors © CARTO'
}).addTo(map);

/* ROUTE COLOR */

var routeColor = "#39FF14";

/* ROUTE FUNCTION */

function animateRoute(coords, link, label){

/* INVISIBLE CLICK AREA (BIG HITBOX) */
let hitbox = L.polyline(coords,{
color:"#000",
weight:20,          // 👈 BIG touch area
opacity:0,          // invisible
interactive:true
}).addTo(map);

/* VISIBLE LINE */
let line = L.polyline([],{
color:routeColor,
weight:6,
opacity:0.95,
lineCap:'round',
lineJoin:'round'
}).addTo(map);

let i = 0;

let interval = setInterval(function(){
line.addLatLng(coords[i]);
i++;
if(i >= coords.length){
clearInterval(interval);
}
},150);

/* CLICK (use hitbox instead of line) */
hitbox.on('click',function(e){
L.DomEvent.stopPropagation(e);
window.location.href = link;
});

/* HOVER (desktop only) */
line.on('mouseover',function(){
line.setStyle({weight:9});
line.bindTooltip(label,{
direction:'top',
className:'route-label'
}).openTooltip();
});

line.on('mouseout',function(){
line.setStyle({weight:6});
line.closeTooltip();
});

/* Prevent weird mobile behavior */
hitbox.on('mousedown',function(e){
L.DomEvent.preventDefault(e);
});

return line;

}

/* CLICK (NO TOOLTIP FLASH) */

line.on('click',function(e){
L.DomEvent.stopPropagation(e);   // prevent weird UI
window.location.href = link;
});

/* TOOLTIP ONLY ON HOVER */

line.on('mouseover',function(){
line.setStyle({weight:8});
line.bindTooltip(label,{
direction:'top',
className:'route-label'
}).openTooltip();
});

line.on('mouseout',function(){
line.setStyle({weight:5});
line.closeTooltip();
});

/* PREVENT FOCUS */

line.on('mousedown',function(e){
L.DomEvent.preventDefault(e);
});

return line;

}

/* ROUTES */

var r1 = animateRoute(
[[60.3172,24.9633],[59.6519,17.9186]],
'flights/efhk-essa.html',
'EFHK → ESSA'
);

var r2 = animateRoute(
[[62.6629,29.6076],[60.3172,24.9633]],
'flights/efjo-efhk.html',
'EFJO → EFHK'
);

var r3 = animateRoute(
[[59.6519,17.9186],[60.1939,11.1004]],
'flights/essa-engm.html',
'ESSA → ENGM'
);

var r4 = animateRoute(
[[60.1939,11.1004],[53.4213,-6.2701]],
'flights/engm-eidw.html',
'ENGM → EIDW'
);

/* AIRPORTS */

function airport(lat,lon){
L.circleMarker([lat,lon],{
radius:4,
color:"#000",
weight:1,
fillColor:"#fff",
fillOpacity:1
}).addTo(map);
}

airport(60.3172,24.9633);
airport(59.6519,17.9186);
airport(62.6629,29.6076);
airport(60.1939,11.1004);
airport(53.4213,-6.2701);

/* FIT */

var group = L.featureGroup([r1,r2,r3,r4]);
map.fitBounds(group.getBounds(),{padding:[80,80]});

</script>

</body>
</html>
