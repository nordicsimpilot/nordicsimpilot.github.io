<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NordicSimPilot</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
background:#0f172a;
color:white;
line-height:1.6;
display:flex;
flex-direction:column;
align-items:center;
}

/* HEADER */

header{
text-align:center;
padding:40px 20px 20px;
}

.logo a{
font-size:28px;
font-weight:600;
text-decoration:none;
color:white;
letter-spacing:1px;
}

nav{
margin-top:10px;
}

nav a{
margin:0 10px;
text-decoration:none;
color:#cbd5f5;
font-size:14px;
}

nav a:hover{
color:white;
}

/* SECTION */

.section{
padding:40px 20px;
max-width:900px;
width:100%;
text-align:center;
}

.section h2{
font-size:26px;
margin-bottom:30px;
}

/* FLIGHT GRID */

.flight-grid{
display:flex;
justify-content:center;
}

/* FLIGHT CARD */

.flight-card{
background:#1e293b;
padding:15px;
border-radius:12px;
border:1px solid rgba(255,255,255,0.05);
text-decoration:none;
color:white;
width:260px;
transition:0.25s;
}

.flight-card:hover{
transform:translateY(-5px);
border:1px solid rgba(255,255,255,0.15);
}

.flight-card img{
width:100%;
height:150px;
object-fit:cover;
border-radius:8px;
margin-bottom:10px;
}

.flight-card h3{
font-size:16px;
margin-bottom:6px;
}

.flight-card p{
font-size:13px;
color:#94a3b8;
}

/* FOOTER */

footer{
margin-top:60px;
padding:20px;
text-align:center;
color:#64748b;
font-size:13px;
}

</style>

</head>

<body>

<header>

<div class="logo">
<a href="/">NordicSimPilot</a>
</div>

<nav>
<a href="#">Flights</a>
<a href="#">Aircraft</a>
<a href="#">Routes</a>
<a href="#">Videos</a>
</nav>

</header>


<section class="section">

<h2>Recent Flight</h2>

<div class="flight-grid">

<a href="flights/efjo-efhk.html" class="flight-card">

<img src="images/JOEN1.png">

<h3>EFJO → EFHK</h3>

<p>Airbus A330</p>
<p>6 Mar 2026 • 45m</p>

</a>

</div>

</section>


<footer>

© 2026 NordicSimPilot  
Hosted on GitHub Pages

</footer>

</body>
</html>
