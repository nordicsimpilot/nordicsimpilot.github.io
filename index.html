<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<title>NordicSimPilot</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:system-ui,-apple-system,Segoe UI,Roboto;
background:#0a0a0a;
color:white;
}

/* MAP */

#map{
position:absolute;
top:0;
bottom:0;
width:100%;
}

/* HEADER */

.header{
position:absolute;
top:20px;
left:50%;
transform:translateX(-50%);
z-index:1000;
text-align:center;
}

.header h1{
margin:0;
font-size:36px;
}

.header p{
margin-top:5px;
color:#b5b5b5;
}

/* MENU */

.menu{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
z-index:1000;
background:rgba(10,10,10,0.85);
padding:12px 20px;
border-radius:10px;
}

.menu a{
color:white;
text-decoration:none;
margin:0 10px;
font-size:15px;
}

.menu a:hover{
text-decoration:underline;
}

</style>

</head>

<body>

<div id="map"></div>

<div class="header">

<h1>NordicSimPilot</h1>
<p>Flight simulation journeys across the Nordic skies</p>

</div>

<div class="menu">

<a href="flights/efhk-essa.html">EFHK → ESSA</a>
<a href="flights/efjo-efhk.html">EFJO → EFHK</a>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

/* MAP */

var map = L.map('map').setView([60,15],4);

/* GRAYSCALE TILES */

L.tileLayer(
'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
{
attribution:'© OpenStreetMap contributors © CARTO'
}).addTo(map);

/* ROUTE EFHK → ESSA */

var efhk_essa = L.polyline([
[60.3172,24.9633],
[59.6519,17.9186]
],{
color:'#00d4ff',
weight:4
}).addTo(map);

efhk_essa.on('click',function(){

window.location.href="flights/efhk-essa.html";

});

/* ROUTE EFJO → EFHK */

var efjo_efhk = L.polyline([
[62.6629,29.6076],
[60.3172,24.9633]
],{
color:'#ffcc00',
weight:4
}).addTo(map);

efjo_efhk.on('click',function(){

window.location.href="flights/efjo-efhk.html";

});

/* AIRPORT MARKERS */

L.marker([60.3172,24.9633]).addTo(map)
.bindPopup("EFHK Helsinki");

L.marker([59.6519,17.9186]).addTo(map)
.bindPopup("ESSA Stockholm");

L.marker([62.6629,29.6076]).addTo(map)
.bindPopup("EFJO Joensuu");

</script>

</body>
</html>
