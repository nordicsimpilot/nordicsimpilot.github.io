<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>My Flight Log</title>

<style>

body{
    font-family: Arial, sans-serif;
    margin:0;
    background:#f4f4f4;
    text-align:center;
}

/* Navigation bar */
nav{
    background:white;
    padding:20px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

/* Menu links */
nav a{
    margin:0 30px;
    text-decoration:none;
    font-size:22px;
    font-weight:bold;
    color:#333;
}

/* Recent flight section */
.recent-flight{
    margin-top:60px;
}

/* Thumbnail size */
.recent-flight img{
    width:320px;
    border-radius:12px;
    cursor:pointer;
}

/* Hover effect */
.recent-flight img:hover{
    transform:scale(1.05);
    transition:0.3s;
}

</style>

</head>

<body>

<!-- Top Navigation -->
<nav>
<a href="#">Home</a>
<a href="#">Flights</a>
<a href="#">Routes</a>
<a href="#">About</a>
</nav>


<!-- Recent Flight -->
<div class="recent-flight">

<h2>Recent Flight</h2>

<a href="https://youtu.be/YOURVIDEOID" target="_blank">
<img src="thumbnail.jpg" alt="Recent Flight">
</a>

<p>Joensuu → Helsinki | X-Plane 12 | A330</p>

</div>

</body>

</html>
