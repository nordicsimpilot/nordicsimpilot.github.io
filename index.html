<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<title>Payam's Flight Logbook</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:system-ui,-apple-system,Segoe UI,Roboto;
background:#0a0a0a;
color:white;
}

.leaflet-interactive:focus{
outline:none !important;
}

#map{
position:absolute;
top:0;
bottom:0;
width:100%;
}

.top-ui{
position:absolute;
top:20px;
left:50%;
transform:translateX(-50%);
z-index:1000;
text-align:center;
background:rgba(10,10,10,0.85);
padding:14px 28px;
border-radius:12px;
}

.top-ui h1{
margin:0;
font-size:28px;
font-weight:600;
}

.top-ui p{
margin-top:4px;
color:#b5b5b5;
font-size:13px;
}

.nav{
margin-top:10px;
display:flex;
justify-content:center;
gap:25px;
}

.nav a{
color:white;
text-decoration:none;
font-size:13px;
opacity:0.9;
}

.nav a:hover{
opacity:1;
text-decoration:underline;
}

.route-label{
background:rgba(0,0,0,0.9);
color:white;
padding:4px 8px;
border-radius:6px;
font-size:12px;
border:none;
}

</style>

</head>

<body>

<div id="map"></div>

<div class="top-ui">
<h1>Payam’s Flight Logbook</h1>
<p>Virtual routes across the world</p>

<div class="nav">
<a href="index.html">Map</a>
<a href="aircraft.html">Aircraft</a>
<a href="about.html">About</a>
</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([58,10],4);

L.tileLayer(
'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
{
attribution:'© OpenStreetMap contributors © CARTO'
}).addTo(map);

var routeColor = "#39FF14";

function animateRoute(coords, link, label){

let line = L.polyline([],{
color:routeColor,
weight:8,
opacity:0.95,
lineCap:'round',
lineJoin:'round'
}).addTo(map);

let i = 0;

let interval = setInterval(function(){
line.addLatLng(coords[i]);
i++;
if(i >= coords.length){
clearInterval(interval);
}
},120);

function goToFlight(e){
L.DomEvent.stopPropagation(e);
window.location.href = link;
}

line.on('click', goToFlight);
line.on('touchstart', goToFlight);

line.on('mouseover',function(){
line.setStyle({weight:11});
line.bindTooltip(label,{
direction:'top',
className:'route-label'
}).openTooltip();
});

line.on('mouseout',function(){
line.setStyle({weight:8});
line.closeTooltip();
});

line.on('mousedown',function(e){
L.DomEvent.preventDefault(e);
});

return line;
}

/* ROUTES */

var r1 = animateRoute(
[[60.3172,24.9633],[59.6519,17.9186]],
'flights/efhk-essa.html',
'EFHK → ESSA'
);

var r2 = animateRoute(
[[62.6629,29.6076],[60.3172,24.9633]],
'flights/efjo-efhk.html',
'EFJO → EFHK'
);

var r3 = animateRoute(
[[59.6519,17.9186],[60.1939,11.1004]],
'flights/essa-engm.html',
'ESSA → ENGM'
);

var r4 = animateRoute(
[[60.1939,11.1004],[53.4213,-6.2701]],
'flights/engm-eidw.html',
'ENGM → EIDW'
);

var r5 = animateRoute(
[[53.4213,-6.2701],[51.4700,-0.4543]],
'flights/eidw-egll.html',
'EIDW → EGLL (A330)'
);

/* NEW ROUTE: HEATHROW → LISBON */
var r6 = animateRoute(
[[51.4700,-0.4543],[38.7742,-9.1342]],
'flights/egll-lppt.html',
'EGLL → LPPT (A330)'
);

/* AIRPORTS */

function airport(lat,lon){
L.circleMarker([lat,lon],{
radius:4,
color:"#000",
weight:1,
fillColor:"#fff",
fillOpacity:1
}).addTo(map);
}

airport(60.3172,24.9633); // EFHK
airport(59.6519,17.9186); // ESSA
airport(62.6629,29.6076); // EFJO
airport(60.1939,11.1004); // ENGM
airport(53.4213,-6.2701); // EIDW
airport(51.4700,-0.4543); // EGLL
airport(38.7742,-9.1342); // LPPT <-- NEW

/* FIT */

var group = L.featureGroup([r1,r2,r3,r4,r5,r6]);
map.fitBounds(group.getBounds(),{padding:[80,80]});

</script>

</body>
</html>
