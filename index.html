<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NordicSimPilot</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
background:#0f172a;
color:white;
line-height:1.6;
display:flex;
flex-direction:column;
align-items:center;
}

/* HERO BANNER */

.hero{
width:100%;
height:420px;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:#000;
}

.hero img{
width:100%;
height:100%;
object-fit:cover;
object-position:center center;
}

/* HEADER */

header{
text-align:center;
padding:40px 20px 20px;
}

.logo a{
font-size:40px;
font-weight:700;
text-decoration:none;
color:white;
letter-spacing:1px;
}

/* SECTION */

.section{
padding:50px 20px;
max-width:1100px;
width:100%;
text-align:center;
}

.section h2{
font-size:34px;
margin-bottom:40px;
}

/* FLIGHT GRID */

.flight-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:30px;
}

/* FLIGHT CARD */

.flight-card{
background:#1e293b;
padding:20px;
border-radius:14px;
border:1px solid rgba(255,255,255,0.05);
text-decoration:none;
color:white;
transition:0.25s;
}

.flight-card:hover{
transform:translateY(-6px);
border:1px solid rgba(255,255,255,0.15);
}

.flight-card img{
width:100%;
height:190px;
object-fit:cover;
border-radius:10px;
margin-bottom:14px;
}

.flight-card h3{
font-size:22px;
margin-bottom:6px;
}

.flight-card p{
font-size:16px;
color:#94a3b8;
}

/* FOOTER */

footer{
margin-top:80px;
padding:30px;
text-align:center;
color:#64748b;
font-size:15px;
}

</style>

</head>

<body>

<!-- ROUTE MAP BANNER -->

<div class="hero">
<img src="images/latest-route.png" alt="Latest Flight Route">
</div>

<header>

<div class="logo">
<a href="/">NordicSimPilot</a>
</div>

</header>


<section class="section">

<h2>Recent Flights</h2>

<div class="flight-grid">

<a href="flights/efhk-essa.html" class="flight-card">

<img src="images/HEL1.PNG">

<h3>EFHK → ESSA</h3>

<p>Airbus A330-300</p>
<p>16 Mar 2026 • 45m</p>

</a>

<a href="flights/efjo-efhk.html" class="flight-card">

<img src="images/JOEN1.png">

<h3>EFJO → EFHK</h3>

<p>Airbus A330</p>
<p>6 Mar 2026 • 45m</p>

</a>

</div>

</section>


<footer>

© 2026 NordicSimPilot  
Hosted on GitHub Pages

</footer>

</body>
</html>
