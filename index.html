<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<title>Payam's Flight Logbook</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:system-ui,-apple-system,Segoe UI,Roboto;
background:#0a0a0a;
color:white;
}

#map{
position:absolute;
top:0;
bottom:0;
width:100%;
}

/* HEADER */

.header{
position:absolute;
top:20px;
left:50%;
transform:translateX(-50%);
z-index:1000;
text-align:center;
background:rgba(10,10,10,0.65);
padding:10px 22px;
border-radius:10px;
}

.header h1{
margin:0;
font-size:32px;
}

.header p{
margin-top:4px;
color:#b5b5b5;
}

/* MENU */

.menu{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
z-index:1000;
background:rgba(10,10,10,0.85);
padding:10px 18px;
border-radius:10px;
}

.menu a{
color:white;
text-decoration:none;
margin:0 10px;
font-size:14px;
}

.menu a:hover{
text-decoration:underline;
}

</style>

</head>

<body>

<div id="map"></div>

<div class="header">
<h1>Payam’s Flight Logbook</h1>
<p>Exploring the world through virtual flight</p>
</div>

<div class="menu">
<a href="flights/efhk-essa.html">EFHK → ESSA</a>
<a href="flights/efjo-efhk.html">EFJO → EFHK</a>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

/* MAP */

var map = L.map('map').setView([60,15],4);

/* GRAYSCALE MAP */

L.tileLayer(
'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
{
attribution:'© OpenStreetMap contributors © CARTO'
}).addTo(map);

/* ROUTE COLOR */

var routeColor = "#39FF14"; // phosphor green

/* ROUTE ANIMATION FUNCTION */

function animateRoute(coords, link){

let line = L.polyline([],{
color:routeColor,
weight:3,
opacity:0.95
}).addTo(map);

let i = 0;

let interval = setInterval(function(){

line.addLatLng(coords[i]);
i++;

if(i >= coords.length){
clearInterval(interval);
}

},180);

/* CLICK ROUTE */

line.on('click',function(){
window.location.href = link;
});

/* HOVER EFFECT */

line.on('mouseover',function(){
line.setStyle({weight:6});
});

line.on('mouseout',function(){
line.setStyle({weight:3});
});

return line;

}

/* ROUTES */

var route1 = animateRoute(
[
[60.3172,24.9633],
[59.6519,17.9186]
],
'flights/efhk-essa.html'
);

var route2 = animateRoute(
[
[62.6629,29.6076],
[60.3172,24.9633]
],
'flights/efjo-efhk.html'
);

/* NICE CITY PINS */

function airport(lat,lon,name){

L.circleMarker([lat,lon],{
radius:5,
color:"#000",
weight:2,
fillColor:"#ffffff",
fillOpacity:1
}).addTo(map).bindPopup(name);

}

/* AIRPORTS */

airport(60.3172,24.9633,"EFHK Helsinki");
airport(59.6519,17.9186,"ESSA Stockholm");
airport(62.6629,29.6076,"EFJO Joensuu");

/* AUTO FIT MAP */

var group = L.featureGroup([route1,route2]);
map.fitBounds(group.getBounds(),{padding:[80,80]});

</script>

</body>
</html>
