<!DOCTYPE html>

<html>
<head>

<meta charset="utf-8">
<title>Payam's Flight Logbook</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:system-ui,-apple-system,Segoe UI,Roboto;
background:#0a0a0a;
color:white;
}

/* MAP */
#map{
position:absolute;
top:0;
bottom:0;
width:100%;
}

/* HEADER */
.top-ui{
position:absolute;
top:20px;
left:50%;
transform:translateX(-50%);
z-index:1000;
background:rgba(10,10,10,0.85);
padding:14px 28px;
border-radius:12px;
text-align:center;
}

.top-ui h1{
margin:0;
font-size:28px;
}

.top-ui p{
margin-top:4px;
color:#b5b5b5;
font-size:13px;
}

/* NAV */
.nav{
margin-top:10px;
display:flex;
gap:20px;
justify-content:center;
}

.nav a{
color:white;
text-decoration:none;
}

.nav a:hover{
text-decoration:underline;
}

/* REMOVE BLACK FOCUS BOX */
.leaflet-interactive:focus {
outline: none !important;
}

/* ROUTES */
.glow-line{
filter: drop-shadow(0 0 6px rgba(47,128,237,0.6));
cursor:pointer;
}

/* LATEST LEG (PROMAGANATE RED) */
.latest-leg{
filter: drop-shadow(0 0 10px rgba(192,57,43,0.9));
}

/* Tooltip */
.route-label{
background:#000;
color:#fff;
padding:4px 8px;
border-radius:6px;
font-size:12px;
}

/* CLICK HINT (subtle pulse animation) */
@keyframes pulse {
0% {opacity:0.7;}
50% {opacity:1;}
100% {opacity:0.7;}
}

.clickable{
animation:pulse 2s infinite;
}

</style>

</head>

<body>

<div id="map"></div>

<div class="top-ui">
<h1>Payam’s Flight Logbook</h1>
<p>Virtual routes across the world</p>
<div class="nav">
<a href="index.html">Map</a>
<a href="flights.html">Flights</a>
<a href="aircraft.html">Aircraft</a>
<a href="about.html">About</a>
</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

/* MAP */
var map = L.map('map').setView([55,10],4);

L.tileLayer(
'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png'
).addTo(map);

/* COLORS */
var defaultColor = "#2F80ED";
var latestColor = "#c0392b"; // pomegranate red

/* DRAW ROUTE */
function animateRoute(coords, link, label, isLatest=false){

let line = L.polyline([],{
color: isLatest ? latestColor : defaultColor,
weight: isLatest ? 6 : 4,
opacity:1,
className: (isLatest ? 'latest-leg clickable' : 'glow-line clickable'),
interactive:true
}).addTo(map);

let i = 0;

let interval = setInterval(()=>{
line.addLatLng(coords[i]);
i++;
if(i >= coords.length) clearInterval(interval);
},100);

/* CLICK */
line.on('click', function(e){
L.DomEvent.stop(e);
window.location.href = link;
});

/* HOVER */
line.on('mouseover',()=>{
line.setStyle({weight: isLatest ? 8 : 6});
line.bindTooltip(label,{className:'route-label'}).openTooltip();
});

line.on('mouseout',()=>{
line.setStyle({weight: isLatest ? 6 : 4});
line.closeTooltip();
});

return line;
}

/* FLIGHTS */

var flights = [

{coords:[[60.3172,24.9633],[59.6519,17.9186]], link:'flights/efhk-essa.html', label:'EFHK → ESSA'},
{coords:[[62.6629,29.6076],[60.3172,24.9633]], link:'flights/efjo-efhk.html', label:'EFJO → EFHK'},
{coords:[[59.6519,17.9186],[60.1939,11.1004]], link:'flights/essa-engm.html', label:'ESSA → ENGM'},
{coords:[[60.1939,11.1004],[53.4213,-6.2701]], link:'flights/engm-eidw.html', label:'ENGM → EIDW'},
{coords:[[53.4213,-6.2701],[51.4700,-0.4543]], link:'flights/eidw-egll.html', label:'EIDW → EGLL'},
{coords:[[51.4700,-0.4543],[38.7742,-9.1342]], link:'flights/egll-lppt.html', label:'EGLL → LPPT'},
{coords:[[38.7742,-9.1342],[40.4722,-3.5608]], link:'flights/lppt-lemd.html', label:'LPPT → LEMD'},
{coords:[[40.4722,-3.5608],[49.0097,2.5479]], link:'flights/lemd-lfpg.html', label:'LEMD → LFPG'},
{coords:[[49.0097,2.5479],[50.9010,4.4844]], link:'flights/lfpg-ebbr.html', label:'LFPG → EBBR'},
{coords:[[50.9010,4.4844],[52.3105,4.7683]], link:'flights/ebbr-eham.html', label:'EBBR → EHAM'},
{coords:[[52.3105,4.7683],[49.6233,6.2044]], link:'flights/eham-ellx.html', label:'EHAM → ELLX'},
{coords:[[49.6233,6.2044],[47.4581,8.5555]], link:'flights/ellx-lszh.html', label:'ELLX → LSZH'},

/* 🔴 LATEST LEG */
{coords:[[47.4581,8.5555],[45.6306,8.7281]], link:'flights/lszh-limc.html', label:'LSZH → LIMC', latest:true}

];

/* DRAW ROUTES */

var routes = [];

flights.forEach(f => {
routes.push(
animateRoute(
f.coords,
f.link,
f.label,
f.latest === true
)
);
});

/* AIRPORTS */

function airport(lat,lon){
L.circleMarker([lat,lon],{
radius:4,
fillColor:"#fff",
color:"#000",
weight:1,
fillOpacity:1
}).addTo(map);
}

flights.forEach(f=>{
airport(f.coords[0][0], f.coords[0][1]);
airport(f.coords[1][0], f.coords[1][1]);
});

/* FIT MAP */

var group = L.featureGroup(routes);
map.fitBounds(group.getBounds(),{padding:[80,80]});

</script>

</body>
</html>
