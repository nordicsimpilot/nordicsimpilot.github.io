<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NordicSimPilot</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
background:#0f172a;
color:white;
line-height:1.6;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
position:absolute;
width:100%;
z-index:2;
flex-wrap:wrap;
}

.logo a{
font-size:22px;
font-weight:600;
text-decoration:none;
color:white;
letter-spacing:1px;
}

nav{
display:flex;
flex-wrap:wrap;
}

nav a{
margin-left:25px;
text-decoration:none;
color:#cbd5f5;
font-size:14px;
}

nav a:hover{
color:white;
}

/* HERO */

.hero{
min-height:70vh;
background-image:url('banner1.png');
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
position:relative;
padding:40px 20px;
}

.hero::before{
content:"";
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(15,23,42,0.65);
}

.hero-content{
position:relative;
z-index:1;
max-width:800px;
}

.hero h1{
font-size:64px;
margin-bottom:10px;
}

.hero p{
font-size:18px;
color:#cbd5f5;
}

/* SECTION */

.section{
padding:80px 30px;
max-width:1100px;
margin:auto;
}

.section h2{
font-size:32px;
margin-bottom:40px;
}

/* FLIGHT GRID */

.flight-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;
}

/* FLIGHT CARD */

.flight-card{
background:#1e293b;
padding:20px;
border-radius:12px;
transition:0.25s;
border:1px solid rgba(255,255,255,0.05);
text-decoration:none;
color:white;
display:block;
}

.flight-card:hover{
transform:translateY(-6px);
border:1px solid rgba(255,255,255,0.15);
}

.flight-card img{
width:100%;
height:180px;
object-fit:cover;
border-radius:10px;
margin-bottom:15px;
}

.flight-card h3{
margin-bottom:8px;
font-size:18px;
}

.flight-card p{
font-size:14px;
color:#94a3b8;
}

/* FOOTER */

footer{
margin-top:80px;
padding:40px 20px;
text-align:center;
color:#64748b;
border-top:1px solid rgba(255,255,255,0.1);
font-size:14px;
}

/* MOBILE */

@media (max-width:768px){

header{
padding:20px;
flex-direction:column;
align-items:flex-start;
}

nav{
margin-top:10px;
}

nav a{
margin-left:0;
margin-right:15px;
margin-top:5px;
}

.hero h1{
font-size:42px;
}

.hero p{
font-size:16px;
}

.section{
padding:60px 20px;
}

}

</style>

</head>

<body>

<header>

<div class="logo">
<a href="/">NordicSimPilot</a>
</div>

<nav>
<a href="#">Flights</a>
<a href="#">Aircraft</a>
<a href="#">Routes</a>
<a href="#">Videos</a>
</nav>

</header>

<section class="hero">

<div class="hero-content">

<h1>NordicSimPilot</h1>

<p>
Virtual flight logbook documenting routes, aircraft and journeys across the skies.
</p>

</div>

</section>

<section class="section">

<h2>Recent Flights</h2>

<div class="flight-grid">

<a href="flights/efjo-efhk.html" class="flight-card">

<img src="images/JOEN1.png">

<h3>EFJO → EFHK</h3>

<p>Aircraft: Airbus A330</p>
<p>Date: 6 Mar 2026</p>
<p>Flight time: 45m</p>

</a>

</div>

</section>

<footer>

© 2026 NordicSimPilot  
Hosted on GitHub Pages

</footer>

</body>
</html>
