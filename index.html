<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NordicSimPilot</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

/* BACKGROUND MAP */

body{
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
color:white;
line-height:1.6;
min-height:100vh;

background-image:
linear-gradient(rgba(10,15,30,0.75), rgba(10,15,30,0.85)),
url("images/map.png");

background-size:cover;
background-position:center;
background-attachment:fixed;

display:flex;
flex-direction:column;
align-items:center;
}

/* HEADER */

header{
text-align:center;
padding:60px 20px 30px;
}

.logo a{
font-size:40px;
font-weight:700;
text-decoration:none;
color:white;
letter-spacing:1px;
}

/* SECTION */

.section{
padding:50px 20px;
max-width:1100px;
width:100%;
text-align:center;
}

.section h2{
font-size:34px;
margin-bottom:40px;
}

/* FLIGHT GRID */

.flight-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:30px;
}

/* FLIGHT CARD */

.flight-card{
background:rgba(15,23,42,0.9);
padding:20px;
border-radius:14px;
border:1px solid rgba(255,255,255,0.08);
text-decoration:none;
color:white;
transition:0.25s;
backdrop-filter:blur(6px);
}

.flight-card:hover{
transform:translateY(-6px);
border:1px solid rgba(255,255,255,0.2);
}

.flight-card img{
width:100%;
height:190px;
object-fit:cover;
border-radius:10px;
margin-bottom:14px;
}

.flight-card h3{
font-size:22px;
margin-bottom:6px;
}

.flight-card p{
font-size:16px;
color:#cbd5f5;
}

/* FOOTER */

footer{
margin-top:80px;
padding:30px;
text-align:center;
color:#94a3b8;
font-size:15px;
}

</style>

</head>

<body>

<header>

<div class="logo">
<a href="/">NordicSimPilot</a>
</div>

</header>


<section class="section">

<h2>Recent Flights</h2>

<div class="flight-grid">

<a href="flights/efhk-essa.html" class="flight-card">

<img src="images/HEL1.PNG">

<h3>EFHK → ESSA</h3>

<p>Airbus A330-300</p>
<p>16 Mar 2026 • 45m</p>

</a>


<a href="flights/efjo-efhk.html" class="flight-card">

<img src="images/JOEN1.png">

<h3>EFJO → EFHK</h3>

<p>Airbus A330</p>
<p>6 Mar 2026 • 45m</p>

</a>

</div>

</section>


<footer>

© 2026 NordicSimPilot  
Hosted on GitHub Pages

</footer>

</body>
</html>
