<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<title>Payam's Flight Logbook</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:system-ui,-apple-system,Segoe UI,Roboto;
background:#0a0a0a;
color:white;
opacity:0;
transition:opacity 1s ease;
}

#map{
position:absolute;
top:0;
bottom:0;
width:100%;
}

.top-ui{
position:absolute;
top:20px;
left:50%;
transform:translateX(-50%);
z-index:1000;
text-align:center;
background:rgba(10,10,10,0.85);
padding:14px 28px;
border-radius:12px;
width:90%;
max-width:420px;
}

.top-ui h1{
margin:0;
font-size:26px;
font-weight:600;
}

.top-ui p{
margin-top:4px;
color:#b5b5b5;
font-size:13px;
}

.nav{
margin-top:10px;
display:flex;
justify-content:center;
gap:20px;
}

.nav a{
color:white;
text-decoration:none;
font-size:13px;
opacity:0.9;
}

.nav a:hover{
opacity:1;
text-decoration:underline;
}

.route-label{
background:rgba(0,0,0,0.9);
color:white;
padding:4px 8px;
border-radius:6px;
font-size:12px;
border:none;
}

</style>

</head>

<body>

<div id="map"></div>

<div class="top-ui">
<h1>Payam’s Flight Logbook</h1>
<p>Virtual routes across the world</p>

<div class="nav">
<a href="index.html">Map</a>
<a href="aircraft.html">Aircraft</a>
<a href="about.html">About</a>
</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// Fade in
window.onload = () => {
document.body.style.opacity = 1;
};

// Map
var map = L.map('map', {tap:true}).setView([55,10],4);

// Dark theme tiles
L.tileLayer(
'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
{
attribution:'© OpenStreetMap © CARTO'
}).addTo(map);

var routeColor = "#39FF14";

// Smooth animation
function animateLine(coords, glow, line){
let i = 0;

function step(){
if(i < coords.length){
glow.addLatLng(coords[i]);
line.addLatLng(coords[i]);
i++;
requestAnimationFrame(step);
}
}

step();
}

// Route creator
function animateRoute(coords, link, label){

let glow = L.polyline([],{
color:routeColor,
weight:16,
opacity:0.2
}).addTo(map);

let line = L.polyline([],{
color:routeColor,
weight:6,
opacity:1,
lineCap:'round'
}).addTo(map);

// Animate
animateLine(coords, glow, line);

// Click behavior
line.on('click', function(e){
L.DomEvent.stopPropagation(e);
line.setStyle({color:"#ffffff"});
setTimeout(()=> {
window.location.href = link;
},150);
});

// Hover
line.on('mouseover',function(){
line.setStyle({weight:9});
line.bindTooltip(label,{
direction:'top',
className:'route-label'
}).openTooltip();
});

line.on('mouseout',function(){
line.setStyle({weight:6});
line.closeTooltip();
});

return line;
}

// Data-driven routes
var routeData = [
{
coords: [[60.3172,24.9633],[59.6519,17.9186]],
link: 'flights/efhk-essa.html',
label: 'EFHK → ESSA'
},
{
coords: [[62.6629,29.6076],[60.3172,24.9633]],
link: 'flights/efjo-efhk.html',
label: 'EFJO → EFHK'
},
{
coords: [[59.6519,17.9186],[60.1939,11.1004]],
link: 'flights/essa-engm.html',
label: 'ESSA → ENGM'
},
{
coords: [[60.1939,11.1004],[53.4213,-6.2701]],
link: 'flights/engm-eidw.html',
label: 'ENGM → EIDW'
},
{
coords: [[53.4213,-6.2701],[51.4700,-0.4543]],
link: 'flights/eidw-egll.html',
label: 'EIDW → EGLL (A330)'
},
{
coords: [[51.4700,-0.4543],[38.7742,-9.1342]],
link: 'flights/egll-lppt.html',
label: 'EGLL → LPPT (A330)'
},
{
coords: [[38.7742,-9.1342],[40.4722,-3.5608]],
link: 'flights/lppt-lemd.html',
label: 'LPPT → LEMD (A330)'
},
{
coords: [[40.4722,-3.5608],[49.0097,2.5479]],
link: 'flights/lemd-lfpg.html',
label: 'LEMD → LFPG (A330)'
},
{
coords: [[49.0097,2.5479],[50.9010,4.4844]],
link: 'flights/lfpg-ebbr.html',
label: 'LFPG → EBBR (A330)'
},
{
coords: [[50.9010,4.4844],[52.3105,4.7683]],
link: 'flights/ebbr-eham.html',
label: 'EBBR → EHAM (A330)'
}
];

// Render routes
var routes = routeData.map(r => 
animateRoute(r.coords, r.link, r.label)
);

// Airports
function airport(lat, lon, name){
L.circleMarker([lat,lon],{
radius:4,
color:"#000",
weight:1,
fillColor:"#fff",
fillOpacity:1
})
.bindTooltip(name, {direction:'top'})
.addTo(map);
}

// Airport data
var airports = [
[60.3172,24.9633,"Helsinki (EFHK)"],
[59.6519,17.9186,"Stockholm (ESSA)"],
[62.6629,29.6076,"Joensuu (EFJO)"],
[60.1939,11.1004,"Oslo (ENGM)"],
[53.4213,-6.2701,"Dublin (EIDW)"],
[51.4700,-0.4543,"London Heathrow (EGLL)"],
[38.7742,-9.1342,"Lisbon (LPPT)"],
[40.4722,-3.5608,"Madrid (LEMD)"],
[49.0097,2.5479,"Paris CDG (LFPG)"],
[50.9010,4.4844,"Brussels (EBBR)"],
[52.3105,4.7683,"Amsterdam (EHAM)"]
];

airports.forEach(a => airport(...a));

// Fit map
var group = L.featureGroup(routes);
map.fitBounds(group.getBounds(),{padding:[80,80]});

</script>

</body>
</html>
