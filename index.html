<!DOCTYPE html>

<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nordic Sim Pilot</title>

<style>

body{
margin:0;
font-family: "Segoe UI", Arial, sans-serif;
background:#0e1a24;
color:white;
}

/* NAVBAR */

nav{
display:flex;
justify-content:center;
gap:40px;
padding:25px;
background:#08131c;
font-size:20px;
font-weight:bold;
letter-spacing:1px;
}

nav a{
color:white;
text-decoration:none;
}

nav a:hover{
color:#4db5ff;
}

/* HERO */

.hero{
text-align:center;
padding:80px 20px 60px 20px;
}

.hero h1{
font-size:48px;
margin-bottom:10px;
}

.hero p{
font-size:20px;
color:#b6c2cf;
}

/* SECTION */

.section{
max-width:1100px;
margin:auto;
padding:60px 20px;
}

.section h2{
text-align:center;
margin-bottom:40px;
font-size:32px;
}

/* FLIGHT CARD */

.flight-card{
background:#13222f;
border-radius:12px;
padding:20px;
max-width:420px;
margin:auto;
text-align:center;
box-shadow:0 6px 20px rgba(0,0,0,0.4);
}

.flight-card img{
width:100%;
border-radius:10px;
}

.flight-card h3{
margin-top:15px;
font-size:22px;
}

.flight-card p{
color:#9fb3c8;
}

/* MAP */

.map{
text-align:center;
}

.map img{
width:90%;
max-width:900px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.5);
}

/* FOOTER */

footer{
text-align:center;
padding:40px;
background:#08131c;
color:#7f95a8;
margin-top:60px;
}

</style>

</head>

<body>

<nav>
<a href="#">Home</a>
<a href="#">Flights</a>
<a href="#">Routes</a>
<a href="#">About</a>
</nav>

<div class="hero">
<h1>Nordic Sim Pilot</h1>
<p>Virtual airline flights across Europe and beyond in X-Plane 12</p>
</div>

<div class="section">

<h2>Recent Flight</h2>

<div class="flight-card">

<a href="https://youtube.com" target="_blank">
<img src="thumbnail.jpg">
</a>

<h3>Joensuu → Helsinki</h3>

<p>Airbus A330 • X-Plane 12</p>

</div>

</div>

<div class="section map">

<h2>Flight Map</h2>

<img src="map.jpg">

</div>

<footer>

© 2026 Nordic Sim Pilot
Flight simulation portfolio powered by GitHub Pages

</footer>

</body>
</html>
