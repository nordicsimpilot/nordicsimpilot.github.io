<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NordicSimPilot</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

/* BACKGROUND MAP */

body{
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
background:#020617;
color:white;
line-height:1.6;
min-height:100vh;

background-image:url("images/map.png");
background-size:contain;
background-position:center center;
background-repeat:no-repeat;
background-attachment:fixed;

display:flex;
flex-direction:column;
align-items:center;
}

/* HEADER */

header{
text-align:center;
padding:60px 20px 30px;
}

.logo a{
font-size:42px;
font-weight:700;
text-decoration:none;
color:#e2e8f0;
letter-spacing:1px;
}

/* RECENT FLIGHTS PANEL */

.section{
margin-top:40px;
padding:50px 40px;
max-width:1100px;
width:95%;

background:rgba(15,23,42,0.75);
border:1px solid rgba(255,255,255,0.08);
border-radius:16px;

backdrop-filter:blur(10px);
}

.section h2{
font-size:32px;
margin-bottom:35px;
color:#f1f5f9;
}

/* GRID */

.flight-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:28px;
}

/* FLIGHT CARD */

.flight-card{
background:rgba(30,41,59,0.95);
padding:20px;
border-radius:14px;
border:1px solid rgba(255,255,255,0.06);
text-decoration:none;
color:white;
transition:all 0.25s ease;
}

.flight-card:hover{
transform:translateY(-6px);
border:1px solid rgba(148,163,184,0.3);
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.flight-card img{
width:100%;
height:190px;
object-fit:cover;
border-radius:10px;
margin-bottom:14px;
}

.flight-card h3{
font-size:22px;
margin-bottom:6px;
color:#f8fafc;
}

.flight-card p{
font-size:15px;
color:#94a3b8;
}

/* FOOTER */

footer{
margin-top:80px;
padding:30px;
text-align:center;
color:#94a3b8;
font-size:14px;
}

</style>

</head>

<body>

<header>

<div class="logo">
<a href="/">NordicSimPilot</a>
</div>

</header>


<section class="section">

<h2>Recent Flights</h2>

<div class="flight-grid">

<a href="flights/efhk-essa.html" class="flight-card">

<img src="images/HEL1.PNG">

<h3>EFHK → ESSA</h3>

<p>Airbus A330-300</p>
<p>16 Mar 2026 • 45m</p>

</a>


<a href="flights/efjo-efhk.html" class="flight-card">

<img src="images/JOEN1.png">

<h3>EFJO → EFHK</h3>

<p>Airbus A330</p>
<p>6 Mar 2026 • 45m</p>

</a>

</div>

</section>


<footer>

© 2026 NordicSimPilot  
Hosted on GitHub Pages

</footer>

</body>
</html>
