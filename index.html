<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NordicSimPilot</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

/* BODY */

body{
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
color:white;
line-height:1.6;
min-height:100vh;

/* BACKGROUND COLOR FROM YOUR IMAGE */

background-color:#0a0a0a;

/* MAP BACKGROUND */

background-image:url("images/map.png");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;

display:flex;
flex-direction:column;
align-items:center;
}

/* HEADER */

header{
text-align:center;
padding:60px 20px 20px;
}

.logo a{
font-size:42px;
font-weight:700;
text-decoration:none;
color:white;
letter-spacing:1px;
}

.tagline{
margin-top:8px;
font-size:16px;
color:#b5b5b5;
}

/* RECENT FLIGHTS PANEL */

.section{
margin-top:40px;
padding:50px 40px;
max-width:1100px;
width:95%;

background:rgba(10,10,10,0.85);
border-radius:16px;
border:1px solid rgba(255,255,255,0.08);
}

/* TITLE */

.section h2{
font-size:32px;
margin-bottom:35px;
}

/* GRID */

.flight-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:28px;
}

/* FLIGHT CARD */

.flight-card{
background:#111111;
padding:20px;
border-radius:14px;
border:1px solid rgba(255,255,255,0.06);
text-decoration:none;
color:white;
transition:all 0.25s ease;
}

.flight-card:hover{
transform:translateY(-6px);
border:1px solid rgba(255,255,255,0.25);
box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

/* IMAGE */

.flight-card img{
width:100%;
height:190px;
object-fit:cover;
border-radius:10px;
margin-bottom:14px;
}

/* ROUTE */

.flight-card h3{
font-size:24px;
margin-bottom:6px;
}

/* TEXT */

.flight-card p{
font-size:15px;
color:#b5b5b5;
}

/* FOOTER */

footer{
margin-top:80px;
padding:30px;
text-align:center;
color:#9c9c9c;
font-size:14px;
}

</style>

</head>

<body>

<header>

<div class="logo">
<a href="/">NordicSimPilot</a>
</div>

<p class="tagline">
Flight simulation journeys across the Nordic skies
</p>

</header>

<section class="section">

<h2>Recent Flights</h2>

<div class="flight-grid">

<a href="flights/efhk-essa.html" class="flight-card">

<img src="images/HEL1.PNG">

<h3>EFHK → ESSA</h3>

<p>Airbus A330-300</p>
<p>16 Mar 2026 • 45m</p>

</a>

<a href="flights/efjo-efhk.html" class="flight-card">

<img src="images/JOEN1.png">

<h3>EFJO → EFHK</h3>

<p>Airbus A330</p>
<p>6 Mar 2026 • 45m</p>

</a>

</div>

</section>

<footer>

© 2026 NordicSimPilot  
Hosted on GitHub Pages

</footer>

</body>
</html>
