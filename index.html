<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<title>Payam's Flight Logbook</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:system-ui,-apple-system,Segoe UI,Roboto;
background:#0a0a0a;
color:white;
}

#map{
position:absolute;
top:0;
bottom:0;
width:100%;
}

/* HEADER LEFT */

.header{
position:absolute;
top:20px;
left:20px;
z-index:1000;
background:rgba(10,10,10,0.65);
padding:8px 14px;
border-radius:8px;
}

.header h1{
margin:0;
font-size:20px;
}

.header p{
margin:2px 0 0;
font-size:12px;
color:#b5b5b5;
}

/* TOP RIGHT MENU */

.menu{
position:absolute;
top:20px;
right:20px;
z-index:1000;
background:rgba(10,10,10,0.75);
padding:8px 14px;
border-radius:8px;
}

.menu a{
color:white;
text-decoration:none;
margin-left:12px;
font-size:13px;
}

.menu a:hover{
text-decoration:underline;
}

/* TOOLTIP STYLE */

.route-label{
background:rgba(0,0,0,0.8);
color:white;
padding:4px 8px;
border-radius:6px;
font-size:12px;
}

</style>

</head>

<body>

<div id="map"></div>

<div class="header">
<h1>Payam’s Flight Logbook</h1>
<p>Virtual routes across the world</p>
</div>

<div class="menu">
<a href="index.html">Map</a>
<a href="#">Flights</a>
<a href="#">About</a>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

/* MAP */

var map = L.map('map').setView([60,15],4);

/* GRAYSCALE MAP */

L.tileLayer(
'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
{
attribution:'© OpenStreetMap contributors © CARTO'
}).addTo(map);

/* ROUTE COLOR */

var routeColor = "#39FF14";

/* ROUTE FUNCTION */

function animateRoute(coords, link, label){

let line = L.polyline([],{
color:routeColor,
weight:3,
opacity:0.95
}).addTo(map);

let i = 0;

let interval = setInterval(function(){
line.addLatLng(coords[i]);
i++;
if(i >= coords.length){
clearInterval(interval);
}
},150);

/* CLICK */

line.on('click',function(){
window.location.href = link;
});

/* HOVER LABEL */

line.bindTooltip(label,{
permanent:false,
direction:'top',
className:'route-label'
});

/* HOVER GLOW */

line.on('mouseover',function(){
line.setStyle({weight:6});
});

line.on('mouseout',function(){
line.setStyle({weight:3});
});

return line;

}

/* ROUTES */

var r1 = animateRoute(
[
[60.3172,24.9633],
[59.6519,17.9186]
],
'flights/efhk-essa.html',
'EFHK → ESSA'
);

var r2 = animateRoute(
[
[62.6629,29.6076],
[60.3172,24.9633]
],
'flights/efjo-efhk.html',
'EFJO → EFHK'
);

/* SMALL CLEAN AIRPORT PINS */

function airport(lat,lon){

L.circleMarker([lat,lon],{
radius:4,
color:"#000",
weight:1,
fillColor:"#fff",
fillOpacity:1
}).addTo(map);

}

airport(60.3172,24.9633);
airport(59.6519,17.9186);
airport(62.6629,29.6076);

/* FIT MAP */

var group = L.featureGroup([r1,r2]);
map.fitBounds(group.getBounds(),{padding:[80,80]});

</script>

</body>
</html>
