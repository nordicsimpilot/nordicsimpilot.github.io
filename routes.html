<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<title>NordicSimPilot Routes</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
background:#0a0a0a;
color:white;
font-family:system-ui;
}

#map{
height:100vh;
width:100%;
}

</style>

</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

/* create map */

var map = L.map('map').setView([60,15],4);

/* base map */

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{

maxZoom:19

}).addTo(map);

/* EFHK → ESSA route */

var efhk_essa = L.polyline([
[60.3172,24.9633],
[59.6519,17.9186]
],{
color:'#00d4ff',
weight:4
}).addTo(map);

/* click route */

efhk_essa.on('click',function(){

window.location.href="flights/efhk-essa.html";

});

/* airport markers */

L.marker([60.3172,24.9633]).addTo(map)
.bindPopup("EFHK Helsinki");

L.marker([59.6519,17.9186]).addTo(map)
.bindPopup("ESSA Stockholm");

</script>

</body>
</html>
