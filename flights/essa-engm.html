<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ESSA → ENGM | Payam’s Flight Logbook</title>

<style>

body{
font-family:system-ui;
background:#0a0a0a;
color:#e5e5e5;
margin:0;
padding:60px 20px;
line-height:1.6;
}

/* CONTAINER */

.container{
max-width:1000px;
margin:auto;
}

/* BACK LINK */

.back{
position:absolute;
top:20px;
left:20px;
color:#cfcfcf;
text-decoration:none;
}

.back:hover{
color:white;
}

/* TITLE */

h1{
margin-bottom:20px;
}

/* INFO */

.info{
margin-bottom:40px;
color:#b5b5b5;
}

/* VIDEO */

.video{
margin-bottom:50px;
}

.video iframe{
width:100%;
height:500px;
border:none;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

/* SECTION HEADINGS */

h2{
margin-top:40px;
margin-bottom:20px;
}

/* GALLERY */

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
}

.gallery img{
width:100%;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.5);
transition:0.25s;
cursor:pointer;
}

.gallery img:hover{
transform:scale(1.03);
}

/* PDF CARD */

.pdf-card{
position:relative;
border-radius:12px;
overflow:hidden;
}

.pdf-card img{
width:100%;
border-radius:12px;
}

.pdf-label{
position:absolute;
bottom:10px;
left:10px;
background:rgba(0,0,0,0.85);
padding:6px 10px;
border-radius:6px;
font-size:13px;
color:white;
}

/* LIGHTBOX */

.lightbox{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
justify-content:center;
align-items:center;
z-index:1000;
}

.lightbox img{
max-width:90%;
max-height:90%;
border-radius:10px;
}

</style>

</head>

<body>

<a href="../index.html" class="back">← Back to Map</a>

<div class="container">

<h1>ESSA → ENGM</h1>

<div class="info">

<p><b>Aircraft:</b> Airbus A330-300</p>
<p><b>Departure:</b> Stockholm Arlanda (ESSA)</p>
<p><b>Arrival:</b> Oslo Gardermoen (ENGM)</p>
<p><b>Simulator:</b> X-Plane 12</p>

</div>

<h2>Flight Video</h2>

<div class="video">

<iframe
src="https://www.youtube.com/embed/9M1BnqBxFic"
title="ESSA to ENGM Flight"
allowfullscreen>
</iframe>

</div>

<h2>Flight Screenshots</h2>

<div class="gallery">

<img src="../images/OSL1.png" onclick="openImage(this.src)">

</div>

</div>

<div id="lightbox" class="lightbox" onclick="closeImage()">
<img id="lightbox-img">
</div>

<script>

function openImage(src){
document.getElementById("lightbox-img").src = src;
document.getElementById("lightbox").style.display = "flex";
}

function closeImage(){
document.getElementById("lightbox").style.display = "none";
}

</script>

</body>
</html>
