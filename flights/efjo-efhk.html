<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EFJO → EFHK | NordicSimPilot</title>

<style>

body{
font-family:system-ui;
background:#0f172a;
color:white;
padding:60px;
line-height:1.6;
max-width:1000px;
margin:auto;
}

a{
color:#94a3b8;
text-decoration:none;
}

a:hover{
color:white;
}

h1{
margin-bottom:20px;
}

.info{
margin-bottom:40px;
}

/* VIDEO */

.video{
margin-bottom:50px;
}

.video iframe{
width:100%;
height:500px;
border:none;
border-radius:10px;
}

/* SCREENSHOT GALLERY */

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
}

.gallery img{
width:100%;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
transition:0.3s;
cursor:pointer;
}

.gallery img:hover{
transform:scale(1.03);
}

/* LIGHTBOX */

.lightbox{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
z-index:1000;
}

.lightbox img{
max-width:90%;
max-height:90%;
border-radius:10px;
}

</style>

</head>

<body>

<a href="../index.html">← Back</a>

<h1>EFJO → EFHK</h1>

<div class="info">

<p><b>Aircraft:</b> Airbus A330</p>
<p><b>Departure:</b> Joensuu (EFJO)</p>
<p><b>Arrival:</b> Helsinki (EFHK)</p>
<p><b>Simulator:</b> X-Plane 12</p>

</div>

<h2>Flight Video</h2>

<div class="video">

<iframe
src="https://www.youtube.com/embed/ZPvxZ7J6lUw"
title="EFJO to EFHK Flight"
allowfullscreen>
</iframe>

</div>

<h2>Flight Screenshots</h2>

<div class="gallery">

<img src="../images/JOEN1.png" onclick="openImage(this.src)">
<img src="../images/JOEN2.png" onclick="openImage(this.src)">
<img src="../images/JOEN3.png" onclick="openImage(this.src)">

</div>

<div class="lightbox" id="lightbox" onclick="closeImage()">
<img id="lightbox-img">
</div>

<script>

function openImage(src){
document.getElementById("lightbox-img").src = src;
document.getElementById("lightbox").style.display = "flex";
}

function closeImage(){
document.getElementById("lightbox").style.display = "none";
}

</script>

</body>
</html>
