<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aircraft | Payam’s Flight Logbook</title>

<style>

body{
font-family:system-ui;
background:#0a0a0a;
color:#e5e5e5;
margin:0;
padding:50px 20px;
}

/* HEADER */

.header{
text-align:center;
margin-bottom:50px;
}

.header h1{
margin:0;
font-size:32px;
}

.header p{
color:#9ca3af;
margin-top:6px;
}

/* BACK LINK */

.back{
position:absolute;
top:20px;
left:20px;
color:#ccc;
text-decoration:none;
}

.back:hover{
color:white;
}

/* GRID */

.grid{
max-width:1100px;
margin:auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:30px;
}

/* CARD */

.card{
background:#111;
border-radius:14px;
overflow:hidden;
border:1px solid rgba(255,255,255,0.08);
transition:0.25s;
}

.card:hover{
transform:translateY(-6px);
border:1px solid rgba(255,255,255,0.2);
}

/* IMAGE */

.card img{
width:100%;
height:200px;
object-fit:cover;
}

/* CONTENT */

.card-content{
padding:20px;
}

.card-content h2{
margin:0 0 10px;
}

.card-content p{
color:#b5b5b5;
font-size:14px;
margin:5px 0;
}

</style>

</head>

<body>

<a href="index.html" class="back">← Back to Map</a>

<div class="header">
<h1>My Aircraft</h1>
<p>Fleet used in my virtual flights</p>
</div>

<div class="grid">

<!-- A330 -->

<div class="card">

<img src="images/a330.png">

<div class="card-content">
<h2>Airbus A330-300</h2>
<p><b>Type:</b> Wide-body Airliner</p>
<p><b>Range:</b> Long haul</p>
<p><b>Typical routes:</b> International</p>
<p><b>Simulator:</b> X-Plane 12</p>
</div>

</div>

<!-- C172 -->

<div class="card">

<img src="images/c172.png">

<div class="card-content">
<h2>Cessna 172 G1000</h2>
<p><b>Type:</b> General Aviation</p>
<p><b>Range:</b> Short haul</p>
<p><b>Typical routes:</b> Training & regional</p>
<p><b>Avionics:</b> Garmin G1000</p>
</div>

</div>

</div>

</body>
</html>
